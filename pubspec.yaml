name: gaming_app
description: A 2D social app with virtual score and minigames (no real money) — Supabase backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^14.2.0
  
  # Backend
  supabase_flutter: ^2.5.6
  
  # UI & Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  flutter_cache_manager: ^3.3.1
  
  # Session persistence (direct dep ensures Windows plugin is registered for Supabase)
  shared_preferences: ^2.5.5
  shared_preferences_windows: ^2.4.1

  # Utilities
  timeago: ^3.6.1
  intl: ^0.19.0
  uuid: ^4.4.0
  http: ^1.2.0
  url_launcher: ^6.3.1
  google_mobile_ads: ^5.3.1
  
  # Icons
  cupertino_icons: ^1.0.6
  timezone: ^0.11.0
  protobuf: ^6.0.0
  fixnum: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  riverpod_lint: ^2.3.10
  protoc_plugin: ^25.0.0

flutter:
  uses-material-design: true
